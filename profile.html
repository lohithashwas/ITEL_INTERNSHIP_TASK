<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h3>My Profile</h3>
            </div>
            <div class="card-body">
                <div id="profileData">
                    <p><strong>Name:</strong> <span id="pName">Loading...</span></p>
                    <p><strong>Email:</strong> <span id="pEmail">Loading...</span></p>
                    <p><strong>Age:</strong> <span id="pAge">Loading...</span></p>
                    <p><strong>Date of Birth:</strong> <span id="pDob">Loading...</span></p>
                    <p><strong>Contact:</strong> <span id="pContact">Loading...</span></p>
                </div>
                <button id="logoutBtn" class="btn btn-danger mt-3">Logout</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
